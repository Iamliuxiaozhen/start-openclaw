services:
  openclaw:
    build: .
    container_name: openclaw-bot
    restart: unless-stopped
    privileged: true
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - /home/oliver/ai-workspace:/workspace
      - /home/oliver/.openclaw:/root/.openclaw

    environment:
      - NODE_ENV=production

    stdin_open: true
    tty: true