version: "2.0"
services:
  openclaw:
    build: .
    container_name: openclaw-bot
    restart: unless-stopped
    ports:
      - "18789:18789"  # Control UI
    volumes:
      - /home/oliver/ai-workspace:/workspace
      - /home/oliver/.openclaw:/root/.openclaw
    environment:
      - NODE_ENV=production